<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live2D Standalone Demo</title>
    <style>
      :root {
        --bg: #0f1724;
        --panel: rgba(15, 23, 36, 0.78);
        --line: rgba(120, 170, 255, 0.35);
        --text: #e8f0ff;
        --muted: #9cb2d9;
        --accent: #5fb3ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(1000px 400px at 80% -20%, rgba(95, 179, 255, 0.25), transparent),
          radial-gradient(800px 500px at -10% 90%, rgba(66, 138, 255, 0.22), transparent),
          var(--bg);
        color: var(--text);
        font-family: "Avenir Next", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      }

      .layout {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: 320px 1fr;
      }

      .panel {
        background: var(--panel);
        border-right: 1px solid var(--line);
        padding: 20px;
        backdrop-filter: blur(8px);
        overflow-y: auto;
        overflow-x: hidden;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.1rem;
        letter-spacing: 0.04em;
      }

      .hint {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 0.88rem;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        color: var(--muted);
        font-size: 0.82rem;
      }

      select,
      button {
        width: 100%;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(12, 20, 32, 0.9);
        color: var(--text);
        padding: 10px;
      }

      button {
        margin-top: 12px;
        border-color: rgba(95, 179, 255, 0.8);
        cursor: pointer;
      }

      button:hover {
        background: rgba(26, 42, 65, 0.95);
      }

      .section {
        margin-top: 16px;
      }

      .section-scroll {
        max-height: 26vh;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 4px;
      }

      .section-scroll::-webkit-scrollbar,
      .panel::-webkit-scrollbar {
        width: 10px;
      }

      .section-scroll::-webkit-scrollbar-thumb,
      .panel::-webkit-scrollbar-thumb {
        background: rgba(95, 179, 255, 0.5);
        border-radius: 999px;
      }

      .section-scroll::-webkit-scrollbar-track,
      .panel::-webkit-scrollbar-track {
        background: rgba(7, 14, 24, 0.45);
      }

      .section-title {
        margin: 0 0 8px;
        color: var(--muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .button-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .button-grid button {
        width: auto;
        flex: 1 1 calc(50% - 8px);
        margin-top: 0;
        padding: 8px 10px;
      }

      #status {
        margin-top: 12px;
        min-height: 40px;
        color: var(--muted);
        font-size: 0.85rem;
        white-space: pre-wrap;
      }

      #validation {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid rgba(95, 179, 255, 0.25);
        border-radius: 10px;
        background: rgba(7, 14, 24, 0.45);
        color: var(--muted);
        font-size: 0.78rem;
        white-space: pre-wrap;
      }

      #status,
      #validation {
        max-height: 14vh;
        overflow-y: auto;
      }

      #stage {
        position: relative;
        width: 100%;
        height: 100%;
      }

      canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }

        .panel {
          border-right: 0;
          border-bottom: 1px solid var(--line);
          max-height: 48vh;
        }

        .section-scroll {
          max-height: 22vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="panel">
        <h1>Live2D Standalone (Python)</h1>
        <p class="hint">このデモは既存サーバー非依存で動作します。</p>

        <label for="model-select">モデル</label>
        <select id="model-select"></select>

        <button id="load-btn" type="button">モデルを読み込む</button>
        <div class="section">
          <p class="section-title">表情</p>
          <div class="section-scroll">
            <div id="expression-buttons" class="button-grid"></div>
          </div>
        </div>
        <div class="section">
          <p class="section-title">アクション</p>
          <div class="section-scroll">
            <div id="motion-buttons" class="button-grid"></div>
          </div>
        </div>
        <div id="status"></div>
        <div id="validation"></div>
      </aside>
      <main id="stage"></main>
    </div>

    <script src="/vendor/live2dcubismcore.min.js"></script>
    <script src="https://unpkg.com/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
    <script src="https://unpkg.com/pixi-live2d-display/dist/cubism4.min.js"></script>
    <script src="./main.js" type="module"></script>
  </body>
</html>
